<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin &mdash; Christian Kl&auml;rungshilfe</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--ink:#0d0d0d;--paper:#f5f0e8;--warm:#e8dcc8;--accent:#c4622d;--muted:#7a7060;}
    body{font-family:'DM Sans',sans-serif;background:#111;color:#eee;min-height:100vh;}

    /* LOGIN */
    #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#111;}
    .login-box{background:#1a1a1a;border:1px solid rgba(196,98,45,0.3);padding:3rem;width:360px;text-align:center;}
    .login-box h1{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:#f5f0e8;margin-bottom:0.5rem;}
    .login-box p{font-size:0.8rem;color:#666;margin-bottom:2rem;letter-spacing:0.1em;text-transform:uppercase;}
    .login-box input{width:100%;background:#0d0d0d;border:1px solid rgba(255,255,255,0.1);padding:0.9rem 1rem;color:#eee;font-family:'DM Sans',sans-serif;font-size:0.9rem;margin-bottom:1rem;outline:none;}
    .login-box input:focus{border-color:var(--accent);}
    .login-box button{width:100%;background:var(--accent);color:#fff;border:none;padding:1rem;font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;}
    .login-box button:hover{background:#8b3a1a;}
    .login-error{color:#e55;font-size:0.82rem;margin-top:0.8rem;display:none;}

    /* ADMIN */
    #admin-screen{display:none;}
    .admin-nav{background:#1a1a1a;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(196,98,45,0.2);}
    .admin-nav h1{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;color:#f5f0e8;}
    .admin-nav h1 span{color:var(--accent);}
    .admin-nav-links{display:flex;gap:1rem;align-items:center;}
    .admin-nav-links a{font-size:0.78rem;letter-spacing:0.1em;text-transform:uppercase;color:#888;text-decoration:none;cursor:pointer;}
    .admin-nav-links a:hover{color:var(--accent);}
    .btn-logout{background:transparent;border:1px solid #444;color:#888;padding:0.5rem 1rem;font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;}
    .btn-logout:hover{border-color:var(--accent);color:var(--accent);}

    .admin-body{display:grid;grid-template-columns:1fr 1.4fr;gap:0;min-height:calc(100vh - 60px);}

    /* POST LIST */
    .post-list-panel{background:#161616;border-right:1px solid #2a2a2a;padding:2rem;}
    .panel-title{font-size:0.7rem;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:#555;margin-bottom:1.5rem;}
    .btn-new{width:100%;background:var(--accent);color:#fff;border:none;padding:0.9rem;font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;margin-bottom:1.5rem;}
    .btn-new:hover{background:#8b3a1a;}
    .post-item{padding:1rem;border:1px solid #2a2a2a;margin-bottom:0.8rem;cursor:pointer;transition:border-color 0.2s;position:relative;}
    .post-item:hover,.post-item.active{border-color:var(--accent);background:#1e1e1e;}
    .post-item-date{font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:0.3rem;}
    .post-item-title{font-size:0.95rem;font-weight:400;color:#ddd;line-height:1.3;}
    .post-item-del{position:absolute;top:0.8rem;right:0.8rem;background:transparent;border:none;color:#444;cursor:pointer;font-size:1rem;padding:0.2rem;}
    .post-item-del:hover{color:#e55;}
    .no-posts{text-align:center;padding:2rem;color:#444;font-size:0.85rem;}

    /* EDITOR */
    .editor-panel{padding:2rem;background:#131313;}
    .editor-panel h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;color:#f5f0e8;margin-bottom:1.5rem;}
    .field{margin-bottom:1.2rem;}
    .field label{display:block;font-size:0.7rem;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:#555;margin-bottom:0.4rem;}
    .field input,.field textarea{width:100%;background:#0d0d0d;border:1px solid #2a2a2a;padding:0.9rem 1rem;color:#eee;font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;resize:none;}
    .field input:focus,.field textarea:focus{border-color:var(--accent);}
    .field textarea{height:320px;line-height:1.7;}
    .editor-actions{display:flex;gap:1rem;margin-top:1.5rem;}
    .btn-save{background:var(--accent);color:#fff;border:none;padding:0.9rem 2rem;font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;}
    .btn-save:hover{background:#8b3a1a;}
    .btn-cancel{background:transparent;color:#666;border:1px solid #333;padding:0.9rem 1.5rem;font-family:'DM Sans',sans-serif;font-size:0.82rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;}
    .btn-cancel:hover{border-color:#666;color:#aaa;}
    .save-status{font-size:0.82rem;color:#5a5;margin-top:0.8rem;display:none;}
    .save-error{font-size:0.82rem;color:#e55;margin-top:0.8rem;display:none;}
    .editor-empty{display:flex;align-items:center;justify-content:center;height:60vh;color:#333;font-size:0.9rem;text-align:center;}

    @media(max-width:800px){
      .admin-body{grid-template-columns:1fr;}
      .post-list-panel{border-right:none;border-bottom:1px solid #2a2a2a;}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>Christian<span style="color:var(--accent)">.</span></h1>
    <p>Admin &mdash; Blog Verwaltung</p>
    <input type="password" id="pw-input" placeholder="Passwort" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button onclick="doLogin()">Anmelden</button>
    <div class="login-error" id="login-error">Falsches Passwort.</div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <div class="admin-nav">
    <h1>Admin<span>.</span> <span style="font-size:1rem;color:#555;">Blog</span></h1>
    <div class="admin-nav-links">
      <a href="/" target="_blank">Website ansehen &rarr;</a>
      <button class="btn-logout" onclick="doLogout()">Abmelden</button>
    </div>
  </div>
  <div class="admin-body">
    <div class="post-list-panel">
      <div class="panel-title">Beitr&auml;ge</div>
      <button class="btn-new" onclick="newPost()">+ Neuer Beitrag</button>
      <div id="post-list"></div>
    </div>
    <div class="editor-panel" id="editor-panel">
      <div class="editor-empty" id="editor-empty">
        <div>
          <p style="font-size:2rem;margin-bottom:1rem;">&#9998;</p>
          <p>Beitrag ausw&auml;hlen oder<br>neuen Beitrag erstellen</p>
        </div>
      </div>
      <div id="editor-form" style="display:none;">
        <h2 id="editor-title-label">Neuer Beitrag</h2>
        <div class="field">
          <label>Titel</label>
          <input type="text" id="f-title" placeholder="Titel des Beitrags"/>
        </div>
        <div class="field">
          <label>Kurzbeschreibung (Vorschau)</label>
          <input type="text" id="f-excerpt" placeholder="Ein kurzer Satz als Vorschau..."/>
        </div>
        <div class="field">
          <label>Inhalt</label>
          <textarea id="f-body" placeholder="Schreibe hier deinen Beitrag..."></textarea>
        </div>
        <div class="editor-actions">
          <button class="btn-save" onclick="savePost()">Speichern &amp; Ver&ouml;ffentlichen</button>
          <button class="btn-cancel" onclick="cancelEdit()">Abbrechen</button>
        </div>
        <div class="save-status" id="save-status">&#10003; Gespeichert!</div>
        <div class="save-error" id="save-error">Fehler beim Speichern. PHP aktiv?</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
const ADMIN_PASSWORD = 'klaerung2025'; // Change this!

// ── STATE ──
let posts = [];
let editingId = null;
let sessionActive = false;

// ── AUTH ──
function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === ADMIN_PASSWORD) {
    sessionActive = true;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadPosts();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function doLogout() {
  sessionActive = false;
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
}

// ── POSTS ──
function loadPosts() {
  fetch('/posts.json?t=' + Date.now())
    .then(r => r.ok ? r.json() : [])
    .then(data => { posts = data || []; renderList(); })
    .catch(() => { posts = []; renderList(); });
}

function renderList() {
  const list = document.getElementById('post-list');
  if (posts.length === 0) {
    list.innerHTML = '<div class="no-posts">Noch keine Beitr&auml;ge.<br>Erstelle deinen ersten!</div>';
    return;
  }
  list.innerHTML = posts.map(p => `
    <div class="post-item ${editingId === p.id ? 'active' : ''}" onclick="editPost('${p.id}')">
      <div class="post-item-date">${p.date}</div>
      <div class="post-item-title">${p.title}</div>
      <button class="post-item-del" onclick="event.stopPropagation();deletePost('${p.id}')" title="L&ouml;schen">&#10005;</button>
    </div>
  `).join('');
}

function newPost() {
  editingId = null;
  document.getElementById('f-title').value = '';
  document.getElementById('f-excerpt').value = '';
  document.getElementById('f-body').value = '';
  document.getElementById('editor-title-label').textContent = 'Neuer Beitrag';
  document.getElementById('editor-empty').style.display = 'none';
  document.getElementById('editor-form').style.display = 'block';
  document.getElementById('save-status').style.display = 'none';
  document.getElementById('save-error').style.display = 'none';
  renderList();
}

function editPost(id) {
  const p = posts.find(x => x.id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('f-title').value = p.title;
  document.getElementById('f-excerpt').value = p.excerpt;
  document.getElementById('f-body').value = p.body;
  document.getElementById('editor-title-label').textContent = 'Beitrag bearbeiten';
  document.getElementById('editor-empty').style.display = 'none';
  document.getElementById('editor-form').style.display = 'block';
  document.getElementById('save-status').style.display = 'none';
  document.getElementById('save-error').style.display = 'none';
  renderList();
}

function cancelEdit() {
  editingId = null;
  document.getElementById('editor-form').style.display = 'none';
  document.getElementById('editor-empty').style.display = 'flex';
  renderList();
}

function savePost() {
  const title = document.getElementById('f-title').value.trim();
  const excerpt = document.getElementById('f-excerpt').value.trim();
  const body = document.getElementById('f-body').value.trim();
  if (!title || !body) { alert('Titel und Inhalt ben&ouml;tigt.'); return; }

  const now = new Date();
  const date = now.toLocaleDateString('de-DE', {day:'2-digit',month:'long',year:'numeric'});

  if (editingId) {
    const idx = posts.findIndex(x => x.id === editingId);
    if (idx > -1) { posts[idx].title = title; posts[idx].excerpt = excerpt || body.substring(0,120)+'...'; posts[idx].body = body; }
  } else {
    const id = 'post_' + Date.now();
    posts.unshift({ id, title, excerpt: excerpt || body.substring(0,120)+'...', body, date });
    editingId = id;
  }

  // Save to server via PHP
  fetch('/save_posts.php', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(posts)
  })
  .then(r => r.json())
  .then(res => {
    if (res.ok) {
      document.getElementById('save-status').style.display = 'block';
      document.getElementById('save-error').style.display = 'none';
      setTimeout(() => document.getElementById('save-status').style.display = 'none', 3000);
    } else {
      document.getElementById('save-error').style.display = 'block';
    }
    renderList();
  })
  .catch(() => {
    document.getElementById('save-error').style.display = 'block';
    renderList();
  });
}

function deletePost(id) {
  if (!confirm('Beitrag wirklich l\u00f6schen?')) return;
  posts = posts.filter(x => x.id !== id);
  if (editingId === id) cancelEdit();
  fetch('/save_posts.php', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(posts)
  })
  .then(() => renderList())
  .catch(() => renderList());
}
</script>
</body>
</html>
