<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Erfahrungsberichte &mdash; Christian Kl&auml;rungshilfe</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--ink:#0d0d0d;--paper:#f5f0e8;--warm:#e8dcc8;--accent:#c4622d;--accent2:#8b3a1a;--muted:#7a7060;--gold:#c9a84c;}
    body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:1.4rem 4rem;background:rgba(245,240,232,0.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(196,98,45,0.12);}
    .nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:var(--ink);text-decoration:none;}
    .nav-logo span{color:var(--accent);}
    nav a.back{font-size:0.8rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;}
    nav a.back:hover{color:var(--accent);}
    .hero{padding:8rem 6rem 4rem;background:var(--ink);}
    .hero p{font-size:0.72rem;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;}
    .hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,5vw,4.5rem);font-weight:300;color:var(--paper);line-height:1.1;}
    .hero h1 em{font-style:italic;color:var(--accent);}
    .blog-container{padding:5rem 6rem;max-width:1200px;margin:0 auto;}
    #posts-list{display:grid;grid-template-columns:repeat(3,1fr);gap:2rem;}
    .post-card{background:var(--warm);border-top:3px solid var(--accent);padding:2rem;cursor:pointer;transition:transform 0.25s;}
    .post-card:hover{transform:translateY(-4px);}
    .post-date{font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:0.8rem;}
    .post-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:400;margin-bottom:0.8rem;line-height:1.3;}
    .post-excerpt{font-size:0.88rem;font-weight:300;line-height:1.7;color:var(--muted);}
    .post-read{display:inline-block;margin-top:1rem;font-size:0.75rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);}

    /* Single post view */
    #single-post{display:none;max-width:720px;margin:0 auto;}
    #single-post h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4vw,3.2rem);font-weight:300;line-height:1.15;margin-bottom:1rem;}
    #single-post .meta{font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid rgba(196,98,45,0.2);}
    #single-post .body{font-size:1.05rem;font-weight:300;line-height:1.9;color:#3a3530;white-space:pre-wrap;}
    .btn-back{display:inline-block;margin-bottom:2rem;font-size:0.78rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);text-decoration:none;cursor:pointer;}
    .btn-back:hover{color:var(--accent);}
    .empty{text-align:center;padding:4rem;color:var(--muted);grid-column:1/-1;}

    footer{background:#080808;padding:2rem 6rem;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(196,98,45,0.15);}
    .footer-logo{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;color:var(--paper);}
    .footer-logo span{color:var(--accent);}
    footer p{font-size:0.75rem;color:rgba(245,240,232,0.3);}

    @media(max-width:900px){
      nav{padding:1.2rem 2rem;}
      .hero{padding:7rem 2rem 3rem;}
      .blog-container{padding:3rem 2rem;}
      #posts-list{grid-template-columns:1fr;}
      footer{flex-direction:column;gap:1rem;padding:2rem;text-align:center;}
    }
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">Christian Hunewald<span>.</span></a>
  <a href="/" class="back">&larr; Zur&uuml;ck zur Startseite</a>
</nav>

<div class="hero">
  <p>Erfahrungsberichte &amp; Einblicke</p>
  <h1>Stimmen aus der <em>Praxis</em></h1>
</div>

<div class="blog-container">
  <!-- List view -->
  <div id="list-view">
    <div id="posts-list">
      <div class="empty">Lade Beitr&auml;ge...</div>
    </div>
  </div>

  <!-- Single post view -->
  <div id="single-post">
    <span class="btn-back" onclick="showList()">&larr; Alle Beitr&auml;ge</span>
    <p class="meta" id="sp-date"></p>
    <h1 id="sp-title"></h1>
    <div class="body" id="sp-body"></div>
  </div>
</div>

<footer>
  <div class="footer-logo">Christian Hunewald<span>.</span></div>
  <p>Kl&auml;rungshilfe &middot; Deutschland</p>
  <p>&copy; 2025 Christian</p>
</footer>

<script>
let allPosts = [];

function showList() {
  document.getElementById('single-post').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
  window.scrollTo(0,0);
  history.pushState({}, '', '/blog.html');
}

function showPost(id) {
  const p = allPosts.find(x => x.id === id);
  if (!p) return;
  document.getElementById('sp-date').textContent = p.date;
  document.getElementById('sp-title').textContent = p.title;
  document.getElementById('sp-body').textContent = p.body;
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('single-post').style.display = 'block';
  window.scrollTo(0,0);
  history.pushState({}, '', '/blog.html?id=' + id);
}

function renderList(posts) {
  const list = document.getElementById('posts-list');
  if (!posts || posts.length === 0) {
    list.innerHTML = '<div class="empty">Noch keine Beitr&auml;ge vorhanden.</div>';
    return;
  }
  list.innerHTML = posts.map(p => `
    <div class="post-card" onclick="showPost('${p.id}')">
      <div class="post-date">${p.date}</div>
      <div class="post-title">${p.title}</div>
      <div class="post-excerpt">${p.excerpt}</div>
      <span class="post-read">Weiterlesen &rarr;</span>
    </div>
  `).join('');
}

fetch('/posts.json?t=' + Date.now())
  .then(r => r.ok ? r.json() : [])
  .then(posts => {
    allPosts = posts || [];
    renderList(allPosts);
    // Check if URL has ?id=
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (id) showPost(id);
  })
  .catch(() => {
    document.getElementById('posts-list').innerHTML = '<div class="empty">Beitr&auml;ge konnten nicht geladen werden.</div>';
  });
</script>
</body>
</html>
